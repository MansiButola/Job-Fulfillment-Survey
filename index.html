<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Fulfillment Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e0d;
    --surface: #1a1916;
    --border: rgba(255,255,255,0.08);
    --text: #f0ede8;
    --muted: #7a776f;
    --accent: #d4a96a;
    --accent-dim: rgba(212,169,106,0.15);
    --low: #c07060;
    --mid: #d4a96a;
    --high: #7ab87a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% -10%, rgba(212,169,106,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .shell {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .brand {
    font-family: 'Instrument Serif', serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 3rem;
    text-align: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,169,106,0.3), transparent);
  }

  /* Progress */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 2.5rem;
  }

  .progress-track {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .progress-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    white-space: nowrap;
  }

  /* Question */
  .q-num {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    color: var(--accent);
    font-size: 14px;
    margin-bottom: 0.75rem;
    opacity: 0;
    transform: translateY(6px);
    animation: fadeUp 0.4s 0.05s forwards;
  }

  .q-text {
    font-family: 'Instrument Serif', serif;
    font-size: 1.7rem;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 2.5rem;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.4s 0.1s forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* Rating buttons */
  .rating-wrap {
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 0.4s 0.18s forwards;
  }

  .rating-labels {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 10px;
    letter-spacing: 0.04em;
  }

  .rating-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 6px;
  }

  .r-btn {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex; align-items: center; justify-content: center;
  }

  .r-btn:hover {
    border-color: rgba(255,255,255,0.2);
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  .r-btn.active-low  { background: rgba(192,112,96,0.18); border-color: var(--low); color: var(--low); }
  .r-btn.active-mid  { background: rgba(212,169,106,0.18); border-color: var(--mid); color: var(--mid); }
  .r-btn.active-high { background: rgba(122,184,122,0.18); border-color: var(--high); color: var(--high); }

  /* Next button */
  .next-wrap {
    margin-top: 2.5rem;
    display: flex;
    justify-content: flex-end;
    opacity: 0;
    animation: fadeUp 0.4s 0.25s forwards;
  }

  .btn-next {
    background: var(--accent);
    color: #1a1510;
    border: none;
    border-radius: 100px;
    padding: 0.75rem 1.75rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.18s ease;
    opacity: 0.35;
    pointer-events: none;
  }

  .btn-next.ready {
    opacity: 1;
    pointer-events: all;
  }

  .btn-next.ready:hover {
    background: #e0bb82;
    transform: translateX(2px);
  }

  .btn-next svg { transition: transform 0.18s; }
  .btn-next.ready:hover svg { transform: translateX(3px); }

  /* Results screen */
  .results { display: none; }
  .results.show { display: block; }
  .question-screen { display: block; }
  .question-screen.hide { display: none; }

  .score-hero {
    text-align: center;
    padding: 1rem 0 2rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.1s forwards;
  }

  .score-circle {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    background: var(--accent-dim);
  }

  .score-num {
    font-family: 'Instrument Serif', serif;
    font-size: 2.4rem;
    color: var(--accent);
    line-height: 1;
  }

  .score-max {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .score-tier {
    font-family: 'Instrument Serif', serif;
    font-size: 1.6rem;
    color: var(--text);
    margin-bottom: 0.4rem;
  }

  .score-desc {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Breakdown */
  .breakdown {
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.25s forwards;
  }

  .breakdown-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .b-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .b-row:last-child { border-bottom: none; }

  .b-q {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .b-rating {
    font-size: 13px;
    font-weight: 500;
    width: 24px;
    text-align: center;
  }

  .b-pts {
    display: none;
  }

  .pts-low  { background: rgba(192,112,96,0.15); color: var(--low); }
  .pts-mid  { background: rgba(212,169,106,0.15); color: var(--mid); }
  .pts-high { background: rgba(122,184,122,0.15); color: var(--high); }

  .btn-restart {
    margin-top: 2rem;
    width: 100%;
    padding: 0.85rem;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 100px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-restart:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

  @media (max-width: 420px) {
    .card { padding: 1.75rem 1.25rem; }
    .q-text { font-size: 1.4rem; }
    .r-btn { font-size: 12px; border-radius: 7px; }
  }
</style>
</head>
<body>

<div class="shell">
  <div class="brand">Work Fulfillment Survey</div>

  <div class="card">

    <!-- Question screen -->
    <div class="question-screen" id="q-screen">
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-label" id="progress-label">1 / 7</div>
      </div>

      <div class="q-num" id="q-num">Question 1</div>
      <div class="q-text" id="q-text"></div>

      <div class="rating-wrap">
        <div class="rating-labels">
          <span>Not at all</span>
          <span>Absolutely</span>
        </div>
        <div class="rating-grid" id="rating-grid"></div>
      </div>

      <div class="next-wrap">
        <button class="btn-next" id="btn-next" onclick="nextQuestion()">
          <span id="btn-label">Next</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Results screen -->
    <div class="results" id="results-screen">
      <div class="score-hero">
        <div class="score-circle">
          <div class="score-num" id="res-score">0</div>
          <div class="score-max" id="res-max">/ 210</div>
        </div>
        <div class="score-tier" id="res-tier"></div>
        <div class="score-desc" id="res-desc"></div>
      </div>
      <div class="breakdown">
        <div class="breakdown-title">Your answers</div>
        <div id="breakdown-list"></div>
      </div>
      <button class="btn-restart" onclick="restart()">Start over</button>
    </div>

  </div>
</div>

<script>
  const questions = [
    "How satisfied do you think are you with your job?",
    "Rate how much do you love the \"work\" you do as your job?",
    "How satisfied you are from the salary that you earn in return to your job?",
    "How often you want the weekend to come after the work week?",
    "How excited are you for the Monday to start the work week?",
    "Does the job that you do help to give the quality of the life (in terms of less stress, better learning opportunities than competitive race, freedom to explore the life, not as an escape from the boring job but the true expression of life...)?",
    "How much excited are you to continue your current job?",
  ];

  // Q4 (index 3) is reverse-scored: wanting the weekend = unhappy at work
  const reversedQuestions = [3];

  const scoringNormal = [
    { min: 1, max: 3, pts: 10, tier: 'low' },
    { min: 4, max: 6, pts: 20, tier: 'mid' },
    { min: 7, max: 10, pts: 30, tier: 'high' },
  ];

  const scoringReversed = [
    { min: 1, max: 3, pts: 30, tier: 'high' },
    { min: 4, max: 6, pts: 20, tier: 'mid' },
    { min: 7, max: 10, pts: 10, tier: 'low' },
  ];

  const tiers = [
    { pct: 0.8, label: 'Thriving',    desc: 'You have a deep connection with your work. It energizes you, aligns with your life, and feels like more than just a job.' },
    { pct: 0.5, label: 'Getting by',  desc: 'There are things you enjoy, but also friction. Some aspects fulfil you — others drain you. Worth reflecting on what to change.' },
    { pct: 0,   label: 'Burned out',  desc: 'Your relationship with work is costing you. This is a signal worth taking seriously — your time and energy deserve better alignment.' },
  ];

  let current = 0;
  let answers = [];
  let selected = null;

  const maxPts = questions.length * 30;

  function scoreRule(v, qIndex) {
    const rules = reversedQuestions.includes(qIndex) ? scoringReversed : scoringNormal;
    return rules.find(r => v >= r.min && v <= r.max);
  }

  function buildGrid() {
    const grid = document.getElementById('rating-grid');
    grid.innerHTML = '';
    selected = null;
    document.getElementById('btn-next').classList.remove('ready');
    for (let v = 1; v <= 10; v++) {
      const b = document.createElement('button');
      b.className = 'r-btn';
      b.textContent = v;
      b.onclick = () => selectRating(v);
      grid.appendChild(b);
    }
  }

  function selectRating(v) {
    selected = v;
    const rule = scoreRule(v, current);
    document.querySelectorAll('.r-btn').forEach((b, i) => {
      b.classList.remove('active-low', 'active-mid', 'active-high');
      if (i + 1 === v) b.classList.add('active-' + rule.tier);
    });
    document.getElementById('btn-next').classList.add('ready');
  }

  function renderQuestion() {
    // Re-animate
    ['q-num','q-text'].forEach(id => {
      const el = document.getElementById(id);
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = '';
    });

    document.getElementById('q-num').textContent = 'Question ' + (current + 1);
    document.getElementById('q-text').textContent = questions[current];
    document.getElementById('progress-label').textContent = (current + 1) + ' / ' + questions.length;
    document.getElementById('progress-fill').style.width = ((current / questions.length) * 100) + '%';

    const isLast = current === questions.length - 1;
    document.getElementById('btn-label').textContent = isLast ? 'See results' : 'Next';

    buildGrid();

    // Restore previous answer if navigating back (not implemented, but pre-select if re-visiting)
    if (answers[current] !== undefined) {
      selectRating(answers[current]);
    }
  }

  function nextQuestion() {
    if (selected === null) return;
    answers[current] = selected;

    if (current < questions.length - 1) {
      current++;
      renderQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    document.getElementById('q-screen').classList.add('hide');
    const rs = document.getElementById('results-screen');
    rs.classList.add('show');

    let total = 0;
    answers.forEach((a, i) => { total += scoreRule(a, i).pts; });

    document.getElementById('res-score').textContent = total;
    document.getElementById('res-max').textContent = '/ ' + maxPts;

    const pct = total / maxPts;
    const tier = tiers.find(t => pct >= t.pct);
    document.getElementById('res-tier').textContent = tier.label;
    document.getElementById('res-desc').textContent = tier.desc;

    // Progress fill to 100%
    document.getElementById('progress-fill').style.width = '100%';

    const list = document.getElementById('breakdown-list');
    list.innerHTML = '';
    questions.forEach((q, i) => {
      const a = answers[i];
      const rule = scoreRule(a, i);
      const row = document.createElement('div');
      row.className = 'b-row';
      row.innerHTML = `
        <div class="b-q">${q}</div>
        <div class="b-rating" style="color:var(--${rule.tier === 'low' ? 'low' : rule.tier === 'mid' ? 'mid' : 'high'})">${a}</div>
        <div class="b-pts pts-${rule.tier}">${rule.pts} pts</div>
      `;
      list.appendChild(row);
    });
  }

  function restart() {
    current = 0;
    answers = [];
    selected = null;
    document.getElementById('results-screen').classList.remove('show');
    document.getElementById('q-screen').classList.remove('hide');
    renderQuestion();
  }

  renderQuestion();
</script>
</body>
</html>
